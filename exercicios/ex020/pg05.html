<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundo</title>
    <style>
        #container{
            position: relative;
            background-color: lightgrey;
            width: 650px;
            height: 300px;
            border: 4px solid black;
        }

        #conteudo{
            font-family: Arial, Helvetica, sans-serif;
            position: absolute;
            background-color: gray;
            margin: 0px;
            width: 265px;
            top: 50%;
            left: 50%;
            padding: 10px;

            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="container">
        <h1 id="conteudo">TEXTO <br> CENTRALIZADO</h1>
    </div>
</body>
</html>
